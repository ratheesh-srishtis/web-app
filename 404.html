<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirect</title>
    <script type="text/javascript">
      // Redirect all routes to index.html for client-side routing
      var path = window.location.pathname;
      var pathArray = path.split("/");

      // Remove the first empty element from split
      pathArray.shift();

      // Remove 'web-app' if it exists (to avoid duplication)
      if (pathArray[0] === "web-app") {
        pathArray.shift();
      }

      // Redirect to index.html with the original path as a query parameter
      window.location.replace("/web-app/?" + pathArray.join("/"));
    </script>
  </head>
  <body></body>
</html>
